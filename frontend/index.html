<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新对话</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <aside class="sidebar" id="sidebar" aria-label="侧边栏">
        <header class="sidebar-head">
          <div class="brand">
            <div class="avatar">li</div>
            <span>li</span>
          </div>
        </header>

        <button class="new-chat-btn" id="newChatBtn" type="button">新对话</button>

        <nav class="menu" aria-label="主菜单">
          <button class="menu-item" id="menuFiles" type="button">文件管理</button>
          <button class="menu-item" id="menuContractReview" type="button">合同审查</button>
          <button class="menu-item" id="menuStatus" type="button">系统状态</button>
        </nav>

        <section class="history" aria-label="历史对话">
          <h2>历史对话</h2>
          <div class="history-list" id="historyList"></div>
        </section>
      </aside>

      <main class="main" aria-label="主内容区">
        <header class="topbar">
          <div class="topbar-title">
            <button class="icon-btn topbar-toggle" id="sidebarToggle" type="button" aria-label="折叠左侧项目栏">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="5" width="16" height="14" rx="4"></rect>
                <path d="M10 6v12"></path>
              </svg>
            </button>
          </div>
        </header>

        <div class="content-layout">
          <section class="conversation-area">
            <section class="welcome" id="welcomePanel">
              <h2>有什么我能帮你的吗？</h2>
              <div class="suggestions">
                <button type="button">帮我总结这个问题的重点</button>
                <button type="button">给我一个可执行计划</button>
                <button type="button">整理这段内容成条目</button>
                <button type="button">解释这个概念并举例</button>
                <button type="button">对比两种方案优缺点</button>
                <button type="button">给出一个简洁版本答案</button>
              </div>
            </section>

            <section class="chat" id="chat" aria-label="对话区"></section>

            <section class="panel-view hidden" id="panelFiles" aria-label="文件管理面板">
              <div class="panel">
                <div class="panel-header">
                  <h3>文件管理</h3>
                  <button class="panel-close" data-close="panelFiles" type="button" aria-label="关闭">×</button>
                </div>
                <p class="panel-text">上传并管理你的文件数据</p>

                <label class="upload-box" id="uploadArea" for="docFileInput">
                  <strong>点击或拖拽上传</strong>
                  <span>支持 .txt .md .pdf .doc .docx .xls .xlsx 文件</span>
                </label>
                <input id="docFileInput" type="file" multiple accept=".txt,.md,.pdf,.doc,.docx,.xls,.xlsx" />
                <div class="file-feedback hidden" id="fileFeedback" aria-live="polite"></div>

                <div class="doc-list" id="docList"></div>
              </div>
            </section>

            <section class="panel-view hidden" id="panelContractReview" aria-label="合同审查面板">
              <div class="panel template-panel">
                <div class="panel-header">
                  <h3>标准模板库</h3>
                  <button class="panel-close" data-close="panelContractReview" type="button" aria-label="关闭">×</button>
                </div>
                <p class="panel-text">上传并管理标准合同模板，供合同审查模式选择和复用。</p>

                <label class="upload-box template-upload-box" id="templateUploadArea" for="templateFileInput">
                  <strong>点击或拖拽上传标准模板</strong>
                  <span>支持 .txt .md .pdf .doc .docx .xls .xlsx 文件</span>
                </label>
                <input id="templateFileInput" type="file" accept=".txt,.md,.pdf,.doc,.docx,.xls,.xlsx" />
                <div class="file-feedback hidden" id="templateFeedback" aria-live="polite"></div>

                <div class="template-list-head">
                  <h4>模板列表</h4>
                  <span id="templateListCount">0 个</span>
                </div>
                <div class="template-list" id="templateList">
                  <div class="template-empty">暂无标准模板</div>
                </div>
              </div>
            </section>

            <section class="panel-view hidden" id="panelStatus" aria-label="系统状态面板">
              <div class="panel">
                <div class="panel-header">
                  <h3>系统状态</h3>
                  <button class="panel-close" data-close="panelStatus" type="button" aria-label="关闭">×</button>
                </div>

                <div class="status-grid" id="statusGrid">
                  <div class="status-item" id="statusPG">
                    <span class="status-label">PostgreSQL</span>
                    <span class="status-dot pending"></span>
                    <span class="status-text">检查中</span>
                  </div>
                  <div class="status-item" id="statusQdrant">
                    <span class="status-label">Qdrant</span>
                    <span class="status-dot pending"></span>
                    <span class="status-text">检查中</span>
                  </div>
                  <div class="status-item" id="statusEmbedding">
                    <span class="status-label">Embedding</span>
                    <span class="status-dot pending"></span>
                    <span class="status-text">检查中</span>
                  </div>
                  <div class="status-item" id="statusReranker">
                    <span class="status-label">Reranker</span>
                    <span class="status-dot pending"></span>
                    <span class="status-text">检查中</span>
                  </div>
                </div>

                <div class="status-actions">
                  <button class="secondary-btn" id="refreshStatusBtn" type="button">刷新</button>
                  <button class="primary-btn" id="bootstrapBtn" type="button">初始化</button>
                </div>
              </div>
            </section>

            <footer class="composer-wrap" id="composerWrap">
              <div class="composer-attachment-tray hidden" id="chatAttachmentTray" aria-label="聊天附件列表"></div>
              <form class="composer" id="composer">
                <input id="input" type="text" placeholder="发消息..." autocomplete="off" />
                <div class="composer-actions">
                  <div class="composer-actions-left">
                    <button
                      class="composer-action composer-action-icon"
                      id="reviewUploadBtn"
                      type="button"
                      aria-label="上传待审合同"
                      title="上传待审合同"
                    >
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                          d="M8.5 12.5 14.86 6.14a3.5 3.5 0 1 1 4.95 4.95l-8.48 8.49a5 5 0 1 1-7.07-7.07l8.84-8.84"
                        ></path>
                      </svg>
                    </button>
                    <span class="composer-action-divider" aria-hidden="true"></span>
                    <button
                      class="composer-action contract-review-toggle"
                      id="contractReviewModeToggle"
                      type="button"
                      aria-pressed="false"
                    >
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 7.5h8"></path>
                        <path d="M8 12h8"></path>
                        <path d="M8 16.5h5"></path>
                        <path d="M6 4.5h12a1.5 1.5 0 0 1 1.5 1.5v12A1.5 1.5 0 0 1 18 19.5H6A1.5 1.5 0 0 1 4.5 18V6A1.5 1.5 0 0 1 6 4.5Z"></path>
                      </svg>
                      <span>合同审查</span>
                    </button>
                  </div>

                  <button class="composer-submit" type="submit" aria-label="发送">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M12 5v14"></path>
                      <path d="m7 10 5-5 5 5"></path>
                    </svg>
                  </button>
                </div>
              </form>
              <input id="chatAttachmentInput" type="file" multiple accept=".txt,.md,.pdf,.doc,.docx,.xls,.xlsx" hidden />
              <input id="reviewContractInput" type="file" multiple accept=".txt,.md,.pdf,.doc,.docx,.xls,.xlsx" hidden />
            </footer>
          </section>

          <aside class="citation-sidebar hidden" id="citationSidebar" aria-label="聊天右侧栏">
            <div class="citation-sidebar-resize" id="citationSidebarResize" aria-hidden="true"></div>
            <div class="citation-sidebar-head">
              <div class="right-sidebar-tabs" role="tablist" aria-label="右侧栏标签页">
                <button
                  class="right-sidebar-tab active"
                  id="rightSidebarTabAttachments"
                  data-right-sidebar-tab="attachments"
                  role="tab"
                  aria-selected="true"
                  type="button"
                >
                  附件
                </button>
                <button
                  class="right-sidebar-tab"
                  id="rightSidebarTabCitations"
                  data-right-sidebar-tab="citations"
                  role="tab"
                  aria-selected="false"
                  type="button"
                >
                  引用来源
                </button>
              </div>
              <button class="citation-sidebar-close" id="citationSidebarClose" type="button" aria-label="关闭右侧栏">×</button>
            </div>

            <section class="right-sidebar-panel" id="rightSidebarAttachmentsPanel" role="tabpanel" aria-labelledby="rightSidebarTabAttachments">
              <div class="citation-sidebar-body">
                <h3 class="right-sidebar-title">附件</h3>
                <div class="right-sidebar-empty" id="rightSidebarAttachmentsBody">上传文件后，这里会显示当前会话附件。</div>
              </div>
            </section>

            <section
              class="right-sidebar-panel hidden"
              id="rightSidebarCitationsPanel"
              role="tabpanel"
              aria-labelledby="rightSidebarTabCitations"
            >
              <div class="citation-sidebar-body">
                <h3 class="right-sidebar-title" id="citationSidebarTitle">引用来源</h3>
                <div id="citationSidebarBody">
                  <p class="panel-text">点击聊天中的“引用来源”后，这里会显示对应案例。</p>
                </div>
              </div>
            </section>
          </aside>
        </div>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
