version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: legal-search-postgres
    environment:
      POSTGRES_USER: ${PG_USER:-legalsearch}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-legalsearch}
      POSTGRES_DB: ${PG_DATABASE:-legal_search}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-legalsearch}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: legal-search-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal-search-backend
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: legal-search-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  qdrantdata:
