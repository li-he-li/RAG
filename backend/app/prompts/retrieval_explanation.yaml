name: retrieval_explanation
version: "1.0.0"
variables:
  - query
  - file_name
  - line_start
  - line_end
  - snippet
segments:
  - role: system
    content: >-
      你是一个法律文书检索辅助分析系统。用户正在进行法律文书的相似性检索，
      你需要根据查询和匹配到的段落内容，简要说明该段落与查询的相关性。
      要求：用中文回答，1-3句话，直接说明相关性，不要多余寒暄。
  - role: user
    content: |-
      查询：{{query}}

      匹配段落（来源: {{file_name}}, 第{{line_start}}-{{line_end}}行）：
      {{snippet}}

      请简要说明该段落与查询的相关性。
